<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0D0D0B;
    min-height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  .wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse 110% 110% at 50% 50%, transparent 36%, #0D0D0B 100%);
    pointer-events: none;
  }

  /* ── Scan label ── */
  .scan-label {
    position: absolute;
    top: 28px;
    right: 32px;
    z-index: 5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(200,82,26,0.45);
    text-transform: uppercase;
    min-width: 110px;
    text-align: right;
  }

  /* ── Center content ── */
  .content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ── Main typing line — no glitch here ── */
  .type-wrap {
    margin-bottom: 44px;
  }

  .type-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(26px, 5.5vw, 48px);
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1;
    color: #F0EDE8;
    white-space: nowrap;
  }

  /* ── Glitch lives only on the word "Burned" ── */
  #text-orange {
    color: #C8521A;
    display: inline-block;
    position: relative;
    animation: glitch-burned 13s linear infinite;
  }

  /* Chromatic ghost layers via pseudo-elements */
  #text-orange::before,
  #text-orange::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  #text-orange::before {
    color: #fb5012;
    animation: ghost-r 13s linear infinite;
  }

  #text-orange::after {
    color: #5533ff;
    animation: ghost-b 13s linear infinite;
  }

  @keyframes glitch-burned {
    0%, 100% { transform: translate(0); }
    72%  { transform: translate(0); }
    73%  { transform: translate(-3px, 0); }
    73.4%{ transform: translate(4px, 0); }
    73.8%{ transform: translate(-2px, 0); }
    74.2%{ transform: translate(0); }
    86%  { transform: translate(0); }
    86.5%{ transform: translate(2px, 0); }
    86.9%{ transform: translate(0); }
  }

  @keyframes ghost-r {
    0%, 71.5%, 74.5%, 100% { opacity: 0; transform: translate(0); }
    72%  { opacity: 0; transform: translate(2px, 0); }
    73%  { opacity: 0.55; transform: translate(6px, 0); }
    73.5%{ opacity: 0.45; transform: translate(5px, 0); }
    74%  { opacity: 0; transform: translate(2px, 0); }
    86%  { opacity: 0; }
    86.5%{ opacity: 0.3; transform: translate(4px, 0); }
    86.9%{ opacity: 0; }
  }

  @keyframes ghost-b {
    0%, 71.5%, 74.5%, 100% { opacity: 0; transform: translate(0); }
    73%  { opacity: 0.35; transform: translate(-5px, 0); }
    73.7%{ opacity: 0.25; transform: translate(-4px, 0); }
    74.2%{ opacity: 0; }
    86.5%{ opacity: 0.18; transform: translate(-3px, 0); }
    86.9%{ opacity: 0; }
  }

  /* ── Block cursor ── */
  .cursor {
    display: inline-block;
    width: 0.52em;
    height: 1em;
    background: #C8521A;
    vertical-align: text-bottom;
    animation: blink 0.85s step-end infinite;
    transition: width 0.35s ease, height 0.35s ease, margin-bottom 0.35s ease;
  }

  /* idle = shrinks to period-sized dot */
  .cursor.idle {
    width: 0.18em;
    height: 0.18em;
    margin-bottom: 0;
    vertical-align: baseline;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── Coming soon ── */
  .coming-soon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3d3d3b;
    border: 1px solid #222220;
    border-radius: 20px;
    padding: 5px 16px;
    margin-bottom: 20px;
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  .coming-soon.visible { opacity: 1; }

  /* ── Learn more button ── */
  .btn-s {
    padding: 13px 32px;
    background: transparent;
    border: 1px solid #2a2a28;
    border-radius: 12px;
    color: #6b6b68;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.2s, color 0.2s, opacity 0.9s ease;
    opacity: 0;
  }
  .btn-s.visible { opacity: 1; }
  .btn-s:hover   { border-color: #3a3a38; color: #8b8b88; }

  /* ── Overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    z-index: 10;
    pointer-events: none;
    transition: background 0.4s ease;
  }
  .overlay.open {
    background: rgba(0,0,0,0.65);
    pointer-events: all;
  }

  /* ── Bottom sheet ── */
  .sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: min(680px, 92vw);
    height: 52vh;
    background: #111110;
    border: 1px solid #2a2a28;
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    z-index: 11;
    transition: transform 0.52s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    padding: 0 32px 40px;
  }
  .sheet.open { transform: translateX(-50%) translateY(0); }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: #2a2a28;
    border-radius: 4px;
    margin: 20px auto 24px;
    flex-shrink: 0;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .sheet-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #C8521A;
  }

  .sheet-close {
    width: 28px;
    height: 28px;
    background: #1a1a18;
    border: 1px solid #2a2a28;
    border-radius: 50%;
    color: #6b6b68;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .sheet-close:hover { border-color: #3a3a38; color: #8b8b88; }

  .sheet-body {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #6b6b68;
    line-height: 1.9;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: none;
  }
  .sheet-body::-webkit-scrollbar { display: none; }

  .sheet-cursor {
    display: inline-block;
    width: 0.52em;
    height: 1em;
    background: #C8521A;
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 0.85s step-end infinite;
  }
</style>

<body>
<div class="wrap">
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="scan-label" id="scan-lbl">Scanning.</div>

  <div class="content">
    <div class="type-wrap">
      <div class="type-display">
        <span id="text-white"></span><span id="text-orange" data-text=""></span><span class="cursor" id="cursor"></span>

    <div class="coming-soon" id="coming-soon">Coming soon</div>

    </div>

</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Code entry modal -->
<div class="overlay" id="code-overlay" onclick="closeCodeModal()" style="z-index:20;"></div>
<div class="sheet" id="code-sheet" style="z-index:21;height:auto;padding-bottom:48px;">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-eyebrow">Access</span>
    <button class="sheet-close" onclick="closeCodeModal()">&#x2715;</button>
  </div>
  <div style="padding:0 32px;">
    <p style="font-size:13px;color:#6b6b68;line-height:1.8;margin-bottom:24px;">Enter your access code to try the demo.</p>
    <input id="code-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      placeholder="access code"
      style="width:100%;background:#0D0D0B;border:1px solid #2a2a28;border-radius:10px;padding:14px 16px;color:#F0EDE8;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.06em;outline:none;transition:border-color 0.2s;"
      onkeydown="if(event.key==='Enter')submitCode()">
    <div id="code-error" style="font-size:11px;color:#C8521A;margin-top:8px;opacity:0;transition:opacity 0.2s;font-family:'JetBrains Mono',monospace;">Incorrect code.</div>
    <button onclick="submitCode()" style="width:100%;margin-top:20px;padding:15px;background:#C8521A;border:none;border-radius:10px;color:#F0EDE8;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;">Enter →</button>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-eyebrow">Burned</span>
    <button class="sheet-close" onclick="closeSheet()">&#x2715;</button>
  </div>
  <div class="sheet-body" id="sheet-body"><span class="sheet-cursor"></span></div>
</div>

<script>
/* ═══════════════════════════════════
   RADAR CANVAS
═══════════════════════════════════ */
(function() {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ember convergence
  const E1_INIT = [0.16, 0.76];
  const E2_INIT = [0.81, 0.22];

  const blips = [
    { fx: 0.14, fy: 0.18, size: 3,   ember: false, alpha: 0 },
    { fx: 0.82, fy: 0.24, size: 3,   ember: false, alpha: 0 },
    { fx: 0.07, fy: 0.52, size: 3.5, ember: false, alpha: 0 },
    { fx: 0.72, fy: 0.60, size: 3,   ember: false, alpha: 0 },
    { fx: 0.91, fy: 0.40, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.24, fy: 0.82, size: 3,   ember: false, alpha: 0 },
    { fx: 0.60, fy: 0.86, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.50, fy: 0.14, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.93, fy: 0.74, size: 3,   ember: false, alpha: 0 },
    { fx: 0.30, fy: 0.32, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.65, fy: 0.42, size: 3,   ember: false, alpha: 0 },
    // two converging ember blips
    { fx: E1_INIT[0], fy: E1_INIT[1], size: 5, ember: true, alpha: 0 },
    { fx: E2_INIT[0], fy: E2_INIT[1], size: 5, ember: true, alpha: 0 },
  ];
  const ember1 = blips[blips.length - 2];
  const ember2 = blips[blips.length - 1];

  const rings = [];
  let lastRingTime    = null;
  const RING_INTERVAL = 3200;
  const FADE          = 0.005;
  let lastTime        = null;
  let pulseCount      = 0;
  let uiRevealed      = false;
  let firstRingPending = false;
  let firstRingFired   = false;

  window._fireFirstRing = function() { firstRingPending = true; };

  function draw(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    const W  = canvas.width;
    const H  = canvas.height;
    const cx = W / 2;
    const cy = H / 2;
    const maxR = Math.sqrt(cx * cx + cy * cy) * 1.08;

    ctx.clearRect(0, 0, W, H);

    [0.18, 0.36, 0.55, 0.75, 0.95].forEach(f => {
      ctx.beginPath();
      ctx.arc(cx, cy, maxR * f, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200,82,26,0.04)';
      ctx.lineWidth = 0.7;
      ctx.stroke();
    });

    ctx.globalAlpha = 0.03;
    ctx.strokeStyle = 'rgba(200,82,26,1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(cx, 0);  ctx.lineTo(cx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy);  ctx.lineTo(W, cy); ctx.stroke();
    ctx.globalAlpha = 1;

    function spawnRing() {
      const pts = 180;
      rings.push({ r: 0, offsets: Array.from({length: pts}, () => (Math.random() - 0.5) * 9) });
      lastRingTime = ts;
      pulseCount++;
      if (pulseCount === 1 && !uiRevealed) {
        uiRevealed = true;
        document.getElementById('coming-soon').classList.add('visible');
        setTimeout(() => {
          document.getElementById('learn-btn').classList.add('visible');
          document.getElementById('code-btn').classList.add('visible');
        }, 1000);
      }

      // Move white blips to new random positions (avoid center where embers converge)
      blips.forEach(b => {
        if (b.ember) return;
        let fx, fy;
        do {
          fx = 0.05 + Math.random() * 0.90;
          fy = 0.05 + Math.random() * 0.90;
        } while (Math.sqrt((fx - 0.5) ** 2 + (fy - 0.5) ** 2) < 0.18);
        b.fx    = fx;
        b.fy    = fy;
        b.alpha = 0;
      });

      // Wander ember blips toward each other; reset when they meet
      const e1x = ember1.fx, e1y = ember1.fy;
      const e2x = ember2.fx, e2y = ember2.fy;
      const dist = Math.sqrt((e2x - e1x) ** 2 + (e2y - e1y) ** 2);
      if (dist < 0.07) {
        ember1.fx = E1_INIT[0]; ember1.fy = E1_INIT[1];
        ember2.fx = E2_INIT[0]; ember2.fy = E2_INIT[1];
      } else {
        const wander = dist * 0.18;
        ember1.fx = Math.max(0.04, Math.min(0.96, e1x + (e2x - e1x) * 0.18 + (Math.random() - 0.5) * wander));
        ember1.fy = Math.max(0.04, Math.min(0.96, e1y + (e2y - e1y) * 0.18 + (Math.random() - 0.5) * wander));
        ember2.fx = Math.max(0.04, Math.min(0.96, e2x + (e1x - e2x) * 0.18 + (Math.random() - 0.5) * wander));
        ember2.fy = Math.max(0.04, Math.min(0.96, e2y + (e1y - e2y) * 0.18 + (Math.random() - 0.5) * wander));
      }
    }

    if (firstRingPending) {
      spawnRing();
      firstRingPending = false;
      firstRingFired   = true;
      lastRingTime     = ts;
    } else if (firstRingFired && lastRingTime !== null && ts - lastRingTime > RING_INTERVAL) {
      spawnRing();
    }

    blips.forEach(b => {
      b.alpha = Math.max(b.alpha - FADE, 0);
    });

    const ringSpeed = maxR / 3400;
    for (let i = rings.length - 1; i >= 0; i--) {
      const ring = rings[i];
      ring.r += dt * ringSpeed;
      const progress  = ring.r / maxR;
      const ringAlpha = Math.max(0, 0.45 * (1 - progress * 1.1));

      if (ringAlpha > 0) {
        const N   = ring.offsets.length;
        const amp = (1 - ring.r / maxR) * 1.0; // ripple fades as ring expands

        function ripplePath() {
          ctx.beginPath();
          for (let j = 0; j <= N; j++) {
            const angle = (j / N) * Math.PI * 2;
            const r2 = ring.r + ring.offsets[j % N] * amp;
            const rx = cx + r2 * Math.cos(angle);
            const ry = cy + r2 * Math.sin(angle);
            j === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
          }
          ctx.closePath();
        }

        ripplePath();
        ctx.strokeStyle = `rgba(200,82,26,${ringAlpha * 0.28})`;
        ctx.lineWidth = 6;
        ctx.stroke();

        ripplePath();
        ctx.strokeStyle = `rgba(200,82,26,${ringAlpha})`;
        ctx.lineWidth = 0.9;
        ctx.stroke();
      }

      blips.forEach(b => {
        const bx   = b.fx * W;
        const by   = b.fy * H;
        const dist = Math.sqrt((bx - cx) ** 2 + (by - cy) ** 2);
        if (Math.abs(ring.r - dist) < dt * ringSpeed * 2 + 5) b.alpha = 1;
      });

      if (ring.r > maxR) rings.splice(i, 1);
    }

    blips.forEach(b => {
      if (b.alpha < 0.01) return;
      const px = b.fx * W;
      const py = b.fy * H;
      const s  = b.size;
      ctx.save();
      ctx.globalAlpha = b.alpha;
      if (b.ember) {
        ctx.shadowColor = 'rgba(251,80,18,0.5)';
        ctx.shadowBlur  = 4;
        ctx.fillStyle   = '#fb5012';
        ctx.fillRect(px - s, py - s, s * 2, s * 2);
        ctx.shadowBlur  = 0;
        ctx.globalAlpha = b.alpha * 0.9;
        ctx.fillStyle   = '#ffaa80';
        ctx.fillRect(px - s * 0.42, py - s * 0.42, s * 0.84, s * 0.84);
      } else {
        ctx.fillStyle = 'rgba(240,237,232,0.8)';
        ctx.fillRect(px - s / 2, py - s / 2, s, s);
      }
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();

/* ═══════════════════════════════════
   ANIMATED DOTS — SCAN LABEL
═══════════════════════════════════ */
(function() {
  const lbl   = document.getElementById('scan-lbl');
  const words = ['Scanning', 'Pinging', 'Tracking'];
  let wordIdx = 0;
  let dotStep = 0;

  setInterval(() => {
    dotStep = (dotStep + 1) % 3;
    if (dotStep === 0) wordIdx = (wordIdx + 1) % words.length;
    lbl.textContent = words[wordIdx] + '.'.repeat(dotStep + 1);
  }, 500);
})();

/* ═══════════════════════════════════
   MAIN TYPEWRITER — "don't get Burned"
   Prefix types at 100ms per char.
   "Burned" slots scramble then resolve.
   Backspace starts automatically so the
   full cycle always lands on 25 seconds.
═══════════════════════════════════ */
(function() {
  const PREFIX         = "don't get ";
  const BURNED         = "Burned";
  const CHARS          = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*<>?/|[]{}';
  const CHAR_MS        = 100;
  const SCRAMBLE_SPEED = 69;
  const SCRAMBLE_DUR   = 1000;
  const RESOLVE_SPEED  = 130;
  const BS_SPEED       = 80;   // ms per backspace step
  const LOOP_MS        = 25000;

  const white  = document.getElementById('text-white');
  const orange = document.getElementById('text-orange');
  const cursor = document.getElementById('cursor');

  let charIdx     = 0;
  let typeTimer   = null;
  let scrambleTmr = null;
  let loopStart   = 0;
  let slots       = new Array(6).fill('');
  let active      = new Array(6).fill(false);
  let resolved    = new Array(6).fill(false);

  function rand() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

  function render() {
    let t = '';
    for (let i = 0; i < 6; i++) { if (active[i]) t += slots[i]; }
    orange.textContent  = t;
    orange.dataset.text = t;
  }

  function startScramble() {
    scrambleTmr = setInterval(() => {
      for (let i = 0; i < 6; i++) {
        if (active[i] && !resolved[i]) slots[i] = rand();
      }
      render();
    }, SCRAMBLE_SPEED);
  }

  function startBackspace() {
    function step() {
      if (orange.textContent.length > 0) {
        orange.textContent  = orange.textContent.slice(0, -1);
        orange.dataset.text = orange.textContent;
        typeTimer = setTimeout(step, BS_SPEED);
      } else if (white.textContent.length > 0) {
        white.textContent = white.textContent.slice(0, -1);
        typeTimer = setTimeout(step, BS_SPEED);
      } else {
        setTimeout(startLoop, 180);
      }
    }
    cursor.classList.remove('idle');
    step();
  }

  function onComplete() {
    cursor.classList.add('idle');
    if (window._fireFirstRing) {
      window._fireFirstRing();
      window._fireFirstRing = null; // once only
    }
    // calculate how long to idle before backspacing so loop = LOOP_MS exactly
    const elapsed  = Date.now() - loopStart;
    const bsTime   = (PREFIX.length + BURNED.length) * BS_SPEED + 280;
    const idleWait = Math.max(0, LOOP_MS - elapsed - bsTime);
    setTimeout(startBackspace, idleWait);
  }

  function resolveLetters() {
    let idx = 0;
    function next() {
      if (idx >= 6) { clearInterval(scrambleTmr); onComplete(); return; }
      resolved[idx] = true;
      slots[idx]    = BURNED[idx];
      render();
      idx++;
      typeTimer = setTimeout(next, RESOLVE_SPEED);
    }
    next();
  }

  function openSlots(idx) {
    if (idx === 0) startScramble();
    if (idx >= 6) { setTimeout(resolveLetters, SCRAMBLE_DUR); return; }
    active[idx] = true;
    slots[idx]  = rand();
    render();
    typeTimer = setTimeout(() => openSlots(idx + 1), CHAR_MS);
  }

  function typePrefix() {
    if (charIdx >= PREFIX.length) { openSlots(0); return; }
    white.textContent += PREFIX[charIdx++];
    typeTimer = setTimeout(typePrefix, CHAR_MS);
  }

  function clearAll() {
    clearTimeout(typeTimer);
    clearInterval(scrambleTmr);
    white.textContent   = '';
    orange.textContent  = '';
    orange.dataset.text = '';
    cursor.classList.remove('idle');
    charIdx  = 0;
    slots    = new Array(6).fill('');
    active   = new Array(6).fill(false);
    resolved = new Array(6).fill(false);
  }

  function startLoop() {
    clearAll();
    loopStart = Date.now();
    typePrefix();
  }

  startLoop();
})();

const SHEET_TEXT = "Burned is a real-world deduction game that pairs you with a stranger in the area. You work against the clock to find each other through turn based questions. First to find the other player wins. No avatars, no maps, no screen between you and the moment. Just a crowd and your instincts.";

let sheetTypeTimer = null;
let sheetCharIdx   = 0;

function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  sheetCharIdx = 0;
  const body = document.getElementById('sheet-body');
  body.innerHTML = '<span class="sheet-cursor"></span>';
  clearInterval(sheetTypeTimer);
  setTimeout(() => {
    sheetTypeTimer = setInterval(() => {
      if (sheetCharIdx >= SHEET_TEXT.length) { clearInterval(sheetTypeTimer); return; }
      body.querySelector('.sheet-cursor').insertAdjacentText('beforebegin', SHEET_TEXT[sheetCharIdx]);
      sheetCharIdx++;
    }, 26);
  }, 560);
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  clearInterval(sheetTypeTimer);
}

const ACCESS_CODE = 'exploreyourboundaries';

function openCodeModal() {
  document.getElementById('code-input').value = '';
  document.getElementById('code-error').style.opacity = '0';
  document.getElementById('code-sheet').classList.add('open');
  document.getElementById('code-overlay').classList.add('open');
  setTimeout(() => document.getElementById('code-input').focus(), 400);
}

function closeCodeModal() {
  document.getElementById('code-sheet').classList.remove('open');
  document.getElementById('code-overlay').classList.remove('open');
}

function submitCode() {
  const val = document.getElementById('code-input').value.trim().toLowerCase();
  if (val === ACCESS_CODE) {
    window.location.href = 'burned_combined_v2.html';
  } else {
    const err = document.getElementById('code-error');
    err.style.opacity = '1';
    const input = document.getElementById('code-input');
    input.style.borderColor = '#C8521A';
    setTimeout(() => { input.style.borderColor = '#2a2a28'; }, 1200);
  }
}
