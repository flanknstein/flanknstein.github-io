<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burned.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0D0D0B;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    background:
      radial-gradient(ellipse 70% 50% at 50% 108%, rgba(200,82,26,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 50% 112%, rgba(251,80,18,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, #0D0D0B 100%);
    pointer-events: none;
  }

  .scan-label {
    position: absolute;
    top: 28px;
    right: 32px;
    z-index: 5;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(200,82,26,0.45);
    text-transform: uppercase;
  }

  .content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ── Logo: constant glow breathe + positional glitch only (always opaque) ── */
  .logo {
    width: 72px;
    height: 105px;
    margin-bottom: 32px;
    animation: logo-anim 10s ease-in-out infinite;
  }

  @keyframes logo-anim {
    0%    { transform: translate(0,0); filter: drop-shadow(0 0 14px rgba(251,80,18,0.38)); }
    25%   { filter: drop-shadow(0 0 26px rgba(251,80,18,0.60)); }
    50%   { filter: drop-shadow(0 0 14px rgba(251,80,18,0.38)); }
    75%   { filter: drop-shadow(0 0 24px rgba(251,80,18,0.54)); }
    /* glitch burst — translate + brightness only, no clip-path, no opacity */
    80%   { transform: translate(0,0);    filter: drop-shadow(0 0 14px rgba(251,80,18,0.38)); }
    81%   { transform: translate(-3px,1px); filter: drop-shadow(0 0 26px rgba(251,80,18,0.80)) brightness(1.5); }
    81.5% { transform: translate(3px,-1px); filter: drop-shadow(0 0 14px rgba(251,80,18,0.50)); }
    82%   { transform: translate(-1px,0);  filter: drop-shadow(0 0 22px rgba(251,80,18,0.70)) brightness(1.3); }
    82.5% { transform: translate(0,0);    filter: drop-shadow(0 0 14px rgba(251,80,18,0.38)); }
    /* second micro-jitter */
    88%   { transform: translate(0,0); }
    88.5% { transform: translate(2px,0); filter: drop-shadow(0 0 20px rgba(251,80,18,0.55)) brightness(1.2); }
    89%   { transform: translate(0,0); filter: drop-shadow(0 0 14px rgba(251,80,18,0.38)); }
    100%  { filter: drop-shadow(0 0 14px rgba(251,80,18,0.38)); }
  }

  /* ── Wordmark: always visible, constant chromatic aberration + glitch burst ── */
  .wordmark-wrap {
    position: relative;
    margin-bottom: 32px;
    animation: word-anim 13s linear infinite;
  }

  .wordmark {
    font-size: 72px;
    font-weight: 500;
    letter-spacing: -3.5px;
    line-height: 1;
    color: #F0EDE8;
    position: relative;
    z-index: 1;
  }
  .wordmark span { color: #C8521A; }

  /* ghost layers — always subtly visible, spike on glitch */
  .wordmark-ghost {
    position: absolute;
    top: 0; left: 0;
    font-size: 72px;
    font-weight: 500;
    letter-spacing: -3.5px;
    line-height: 1;
    pointer-events: none;
    white-space: nowrap;
    mix-blend-mode: screen;
  }

  /* main wrapper: translate-only glitch, never opacity or clip-path */
  @keyframes word-anim {
    0%, 100% { transform: translate(0); }
    /* very slow micro-drift to feel alive */
    20%  { transform: translate(0.4px,0); }
    40%  { transform: translate(-0.4px,0); }
    60%  { transform: translate(0.3px,0); }
    /* glitch burst */
    72%  { transform: translate(0); }
    73%  { transform: translate(-3px,0); }
    73.4%{ transform: translate(4px,0); }
    73.8%{ transform: translate(-2px,0); }
    74.2%{ transform: translate(0); }
    /* micro-jitter */
    86%  { transform: translate(0); }
    86.4%{ transform: translate(2px,0); }
    86.7%{ transform: translate(0); }
  }

  /* orange ghost — always at low opacity, spikes on glitch */
  .wordmark-ghost.r { color: #fb5012; animation: ghost-r 13s linear infinite; }
  @keyframes ghost-r {
    0%, 100% { opacity: 0.07; transform: translate(2px,0); }
    20%  { opacity: 0.10; transform: translate(2.5px,0); }
    40%  { opacity: 0.06; transform: translate(1.5px,0); }
    72%  { opacity: 0.07; transform: translate(2px,0); }
    73%  { opacity: 0.55; transform: translate(6px,0); }
    73.4%{ opacity: 0.45; transform: translate(5px,0); }
    74%  { opacity: 0.07; transform: translate(2px,0); }
    86%  { opacity: 0.07; transform: translate(2px,0); }
    86.4%{ opacity: 0.30; transform: translate(4px,0); }
    86.7%{ opacity: 0.07; transform: translate(2px,0); }
  }

  /* blue ghost — always at low opacity, spikes on glitch */
  .wordmark-ghost.b { color: #7055ff; animation: ghost-b 13s linear infinite; }
  @keyframes ghost-b {
    0%, 100% { opacity: 0.05; transform: translate(-1.5px,0); }
    20%  { opacity: 0.07; transform: translate(-2px,0); }
    40%  { opacity: 0.04; transform: translate(-1px,0); }
    72%  { opacity: 0.05; transform: translate(-1.5px,0); }
    73%  { opacity: 0.35; transform: translate(-5px,0); }
    73.6%{ opacity: 0.28; transform: translate(-4px,0); }
    74.2%{ opacity: 0.05; transform: translate(-1.5px,0); }
    86.4%{ opacity: 0.20; transform: translate(-3px,0); }
    86.7%{ opacity: 0.05; transform: translate(-1.5px,0); }
  }

  .tagline-1 {
    font-size: 18px;
    color: #6b6b68;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }
  .tagline-2 {
    font-size: 18px;
    color: #C8521A;
    line-height: 1.6;
    letter-spacing: 0.01em;
    margin-bottom: 52px;
  }

  .btns {
    display: flex;
    gap: 12px;
  }

  .coming-soon {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3d3d3b;
    border: 1px solid #222220;
    border-radius: 20px;
    padding: 5px 16px;
    margin-bottom: 40px;
  }

  .btn-s {
    padding: 14px 36px;
    background: transparent;
    border: 1px solid #2a2a28;
    border-radius: 12px;
    color: #6b6b68;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-s:hover { border-color: #3a3a38; color: #8b8b88; }

  /* ── Overlay scrim ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    z-index: 10;
    pointer-events: none;
    transition: background 0.4s ease;
  }
  .overlay.open {
    background: rgba(0,0,0,0.65);
    pointer-events: all;
  }

  /* ── Bottom sheet popup ── */
  .sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: min(680px, 92vw);
    height: 52vh;
    background: #111110;
    border: 1px solid #2a2a28;
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    z-index: 11;
    transition: transform 0.52s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    padding: 0 32px 40px;
    box-sizing: border-box;
  }
  .sheet.open {
    transform: translateX(-50%) translateY(0);
  }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: #2a2a28;
    border-radius: 4px;
    margin: 20px auto 24px;
    flex-shrink: 0;
  }

  .sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .sheet-eyebrow {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #C8521A;
  }

  .sheet-close {
    width: 28px;
    height: 28px;
    background: #1a1a18;
    border: 1px solid #2a2a28;
    border-radius: 50%;
    color: #6b6b68;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .sheet-close:hover { border-color: #3a3a38; color: #8b8b88; }

  .sheet-body {
    font-size: 15px;
    color: #6b6b68;
    line-height: 1.75;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: none;
  }
  .sheet-body::-webkit-scrollbar { display: none; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #C8521A;
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <div class="scan-label" id="scan-lbl">Scanning</div>

  <div class="content">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 499.73 729.32" aria-hidden="true">
      <path fill="#fb5012" d="M288.04,466.25l1.06,2.6c-4.26,5.43-8.59,10.77-13.01,16.01l-2.86-.4c.49.85,1.21,2.14.75,2.71-1.91,2.35-15.69,16.07-17.33,16.09-.57,0-1.14-.26-1.72-.59l.46,2.78c-5.28,4.28-10.57,8.56-15.86,12.84l-2.9-.81c-14.66,11.87-65.44,41.39-72.45,23.81-1.77-4.44.11-10.93,5.3-13.24,14.4-6.4,27.89-12.72,41.39-21.05,49.42-30.5,83.17-79.67,93.11-137.07,9.95-57.54-1.7-117.68-42.04-161.77-3.69,24.49-12.31,51.35-32.47,66.18-8.64,5.97-17.57,8.14-27.73,7.17-16.27-1.55-27.49-14.86-25.35-31.68l5.96-26c3.74-16.33,5.75-32.36,3.4-49-8.04-56.78-47.07-104.47-93.32-136.42,16.06,77.59,1.64,165.79-58.37,220.66-10.18,9.3-20.71,16.91-34.04,21.93,14.62-16.9,27.57-32.71,38.72-51.44C78.07,163.41,85.57,83.65,60.62,11.02c-1.04-3.04-.03-6.89,1.27-8.71,1.68-2.34,5.96-2.9,9.21-1.69,28.76,10.71,62.84,38.47,83.98,61.76,32.73,36.05,56.51,81.68,54.56,131.25-.74,18.74-4.97,35.93-9.84,53.78-.85,3.11-.97,6.51.64,8.86,4.02,5.87,14.63,3.38,22.04-7.14,22.33-31.7,14.82-72.81,23.27-78.13,2.37-1.49,7.2-1.4,9.8.43,19.52,13.76,34.32,31.83,46.63,52.48,20.02,33.58,28.33,71.35,28.02,110.68-.38,47.62-14.68,93.03-42.14,131.66Z"/>
      <path fill="#595959" d="M236.63,517.48l18.3-14.82,2.34-1.12,197.22,197.98c12.37,9.79,26.64-1.45,14.9-15.66l-196.81-196.61.66-2.8,5.4-6.43,9.41-11.78,204.29,203.99c11.12,15.54,9.72,35.95-4.35,49.21-12.99,11.2-35.27,14.51-48.57,1.25l-202.78-203.22Z"/>
    </svg>

    <div class="wordmark-wrap">
      <div class="wordmark-ghost r">Burned.</div>
      <div class="wordmark-ghost b">Burned.</div>
      <div class="wordmark">Burned<span>.</span></div>
    </div>

    <p class="tagline-1">Find them before they find you.</p>
    <p class="tagline-2">Good luck.</p>
    <div class="coming-soon">Coming soon</div>
    <button class="btn-s" onclick="openSheet()">Learn more</button>
  </div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-eyebrow">Burned</span>
    <button class="sheet-close" onclick="closeSheet()">&#x2715;</button>
  </div>
  <div class="sheet-body" id="sheet-body"><span class="cursor"></span></div>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const lbl    = document.getElementById('scan-lbl');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Blip positions (fractional from center offset, stored as absolute fractions of W/H)
  const blips = [
    { fx: 0.14, fy: 0.18, size: 3,   ember: false, alpha: 0 },
    { fx: 0.82, fy: 0.24, size: 3,   ember: false, alpha: 0 },
    { fx: 0.07, fy: 0.52, size: 3.5, ember: false, alpha: 0 },
    { fx: 0.72, fy: 0.60, size: 3,   ember: false, alpha: 0 },
    { fx: 0.38, fy: 0.72, size: 5,   ember: true,  alpha: 0.08 },
    { fx: 0.91, fy: 0.40, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.24, fy: 0.82, size: 3,   ember: false, alpha: 0 },
    { fx: 0.60, fy: 0.86, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.50, fy: 0.14, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.93, fy: 0.74, size: 3,   ember: false, alpha: 0 },
    { fx: 0.30, fy: 0.32, size: 2.5, ember: false, alpha: 0 },
    { fx: 0.65, fy: 0.42, size: 3,   ember: false, alpha: 0 },
  ];

  // Expanding rings
  const rings = [];
  let lastRingTime = -3000;
  const RING_INTERVAL = 3200; // ms between new rings

  const FADE = 0.005;
  let lastTime = null;

  const statusMsgs = ['Scanning', 'Scanning', 'Pinging', 'Tracking', 'Scanning'];
  let lblIdx = 0;

  function draw(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    const W  = canvas.width;
    const H  = canvas.height;
    const cx = W / 2;
    const cy = H / 2;
    const maxR = Math.sqrt(cx * cx + cy * cy) * 1.08;

    ctx.clearRect(0, 0, W, H);

    // Static reference rings (very faint)
    const refFracs = [0.18, 0.36, 0.55, 0.75, 0.95];
    refFracs.forEach(f => {
      ctx.beginPath();
      ctx.arc(cx, cy, maxR * f, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(200,82,26,0.045)';
      ctx.lineWidth = 0.7;
      ctx.stroke();
    });

    // Crosshair lines
    ctx.globalAlpha = 0.035;
    ctx.strokeStyle = 'rgba(200,82,26,1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(cx, 0);  ctx.lineTo(cx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, cy);  ctx.lineTo(W, cy); ctx.stroke();
    ctx.globalAlpha = 1;

    // Spawn new ring
    if (ts - lastRingTime > RING_INTERVAL) {
      rings.push({ r: 0 });
      lastRingTime = ts;
      lblIdx = (lblIdx + 1) % statusMsgs.length;
      lbl.textContent = statusMsgs[lblIdx];
    }

    // Update blips: decay all
    blips.forEach(b => {
      b.alpha = Math.max(b.alpha - FADE, b.ember ? 0.06 : 0);
    });

    // Update and draw rings
    const ringSpeed = maxR / 3400; // crosses full radius in 3.4s
    for (let i = rings.length - 1; i >= 0; i--) {
      const ring = rings[i];
      ring.r += dt * ringSpeed;

      const progress = ring.r / maxR;
      const ringAlpha = Math.max(0, 0.45 * (1 - progress * 1.1));

      if (ringAlpha > 0) {
        // Outer soft glow ring
        ctx.beginPath();
        ctx.arc(cx, cy, ring.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(200,82,26,${ringAlpha * 0.3})`;
        ctx.lineWidth = 6;
        ctx.stroke();
        // Sharp inner ring
        ctx.beginPath();
        ctx.arc(cx, cy, ring.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(200,82,26,${ringAlpha})`;
        ctx.lineWidth = 0.9;
        ctx.stroke();
      }

      // Light up blips the ring sweeps over
      blips.forEach(b => {
        const bx   = b.fx * W;
        const by   = b.fy * H;
        const dist = Math.sqrt((bx - cx) ** 2 + (by - cy) ** 2);
        const tol  = dt * ringSpeed * 2 + 5;
        if (Math.abs(ring.r - dist) < tol) {
          b.alpha = 1;
        }
      });

      if (ring.r > maxR) rings.splice(i, 1);
    }

    // Draw blips as squares
    blips.forEach(b => {
      if (b.alpha < 0.01) return;

      const px = b.fx * W;
      const py = b.fy * H;
      const s  = b.size;

      ctx.save();
      ctx.globalAlpha = b.alpha;

      if (b.ember) {
        // ember blip: orange square, very slight shadow
        ctx.shadowColor  = 'rgba(251,80,18,0.6)';
        ctx.shadowBlur   = 4;
        ctx.fillStyle    = '#fb5012';
        ctx.fillRect(px - s, py - s, s * 2, s * 2);
        // tiny bright core
        ctx.shadowBlur   = 0;
        ctx.globalAlpha  = b.alpha * 0.9;
        ctx.fillStyle    = '#ffaa80';
        ctx.fillRect(px - s * 0.45, py - s * 0.45, s * 0.9, s * 0.9);
      } else {
        ctx.shadowBlur   = 0;
        ctx.fillStyle    = `rgba(240,237,232,${0.75 + b.alpha * 0.15})`;
        ctx.fillRect(px - s / 2, py - s / 2, s, s);
      }

      ctx.restore();
    });

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();

const SHEET_TEXT = "Burned is a real-world deduction game that pairs you with a stranger in the same space. You start with a simple clue, then take turns asking yes or no questions to narrow down your search to find one another. First to find the other player and give the signal wins. No avatars, no maps, no screen between you and the moment. Just a crowd and your instincts.";

let typeTimer = null;
let charIndex = 0;

function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  charIndex = 0;
  const body = document.getElementById('sheet-body');
  body.innerHTML = '<span class="cursor"></span>';
  clearInterval(typeTimer);
  setTimeout(() => {
    typeTimer = setInterval(() => {
      if (charIndex >= SHEET_TEXT.length) { clearInterval(typeTimer); return; }
      const cursor = body.querySelector('.cursor');
      cursor.insertAdjacentText('beforebegin', SHEET_TEXT[charIndex]);
      charIndex++;
    }, 26);
  }, 560);
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  clearInterval(typeTimer);
}
</script>
</body>
</html>
