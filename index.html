<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burned.</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PCS0J0C1ZK"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PCS0J0C1ZK');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0D0D0B;
    min-height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Popup notification ── */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    background: #111110;
    border: 1px solid #2a2a28;
    border-radius: 10px;
    padding: 11px 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease, transform 0.45s ease;
    z-index: 10;
  }
  .popup.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: all;
  }
  .popup.out {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.96);
    pointer-events: none;
  }

  .popup-row {
    display: flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
  }

  .popup-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: #F0EDE8;
    transition: color 0.2s;
  }
  .popup-row:hover .popup-label { color: #C8521A; }

  /* ── Main area (cursor + text + arrow) ── */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 44px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .main.visible { opacity: 1; }

  /* ── Type lines wrapper ── */
  .type-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }

  /* ── Typed text ── */
  .type-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(20px, 4vw, 38px);
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1.3;
    color: #F0EDE8;
  }
  #line2 { opacity: 0; transition: opacity 0.15s; }

  /* ── Ember block cursor ── */
  .cursor {
    display: inline-block;
    width: 0.52em;
    height: 1em;
    background: #C8521A;
    vertical-align: text-bottom;
    animation: blink 0.85s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── Arrow button ── */
  .arrow-btn {
    width: 48px;
    height: 48px;
    background: transparent;
    border: 1px solid #2a2a28;
    border-radius: 12px;
    color: #6b6b68;
    font-size: 18px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: border-color 0.2s, color 0.2s, opacity 0.8s ease;
  }
  .arrow-btn.visible { opacity: 1; }
  .arrow-btn:hover   { border-color: #3a3a38; color: #9b9b98; }
</style>
</head>
<body>

<!-- Notification popup -->
<div class="popup" id="popup">
  <div class="popup-row" id="open-btn">
    <svg width="16" height="13" viewBox="0 0 16 13" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="0.6" y="0.6" width="14.8" height="11.8" rx="1.6" stroke="#C8521A" stroke-width="1.2"/>
      <path d="M0.6 3L8 8L15.4 3" stroke="#C8521A" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="popup-label">new message</span>
  </div>
</div>

<!-- Reveal: cursor → typed text → arrow -->
<div class="main" id="main">
  <div class="type-wrap">
    <div class="type-display" id="line1"><span id="tw1"></span><span class="cursor" id="cur1"></span></div>
    <div class="type-display" id="line2"><span id="tw2"></span><span class="cursor" id="cur2"></span></div>
  </div>
  <button class="arrow-btn" id="arrow-btn" onclick="window.location.href='home/'">&#x2192;</button>
</div>

<script>
const popup    = document.getElementById('popup');
const openBtn  = document.getElementById('open-btn');
const main     = document.getElementById('main');
const tw1      = document.getElementById('tw1');
const tw2      = document.getElementById('tw2');
const cur1     = document.getElementById('cur1');
const cur2     = document.getElementById('cur2');
const line2    = document.getElementById('line2');
const arrowBtn = document.getElementById('arrow-btn');

const LINE1   = "Someone's looking for you.";
const LINE2   = "Can you find them first?";
const CHAR_MS = 100;
const PRE_MS  = 3000;
const PAUSE   = 2000;

setTimeout(() => popup.classList.add('visible'), 500);

openBtn.addEventListener('click', () => {
  popup.classList.remove('visible');
  popup.classList.add('out');
  setTimeout(() => {
    main.classList.add('visible');
    setTimeout(typeLine1, PRE_MS);
  }, 450);
});

function typeLine1() {
  let idx = 0;
  function next() {
    if (idx >= LINE1.length) {
      setTimeout(() => {
        cur1.style.opacity = '0';
        cur1.style.animation = 'none';
        line2.style.opacity = '1';
        setTimeout(typeLine2, 80);
      }, PAUSE);
      return;
    }
    tw1.textContent += LINE1[idx++];
    setTimeout(next, CHAR_MS);
  }
  next();
}

function typeLine2() {
  let idx = 0;
  function next() {
    if (idx >= LINE2.length) {
      setTimeout(() => arrowBtn.classList.add('visible'), 500);
      return;
    }
    tw2.textContent += LINE2[idx++];
    setTimeout(next, CHAR_MS);
  }
  next();
}
</script>
</body>
</html>
